# Base: very_good_analysis is a stricter superset of flutter_lints — swap
# for `package:flutter_lints/flutter.yaml` if you want a lighter baseline.
# include: package:very_good_analysis/analysis_options.yaml

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "build/**"

linter:
  rules:
    # ---- Naming (Section 27 in the old RULE.md) ----
    file_names: true                       # snake_case file names
    camel_case_types: true                 # PascalCase classes
    non_constant_identifier_names: true    # camelCase members/functions
    library_names: true
    package_names: true

    # # ---- UI rules (old Section 10) ----
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_literals_to_create_immutables: true
    sized_box_for_whitespace: true
    use_key_in_widget_constructors: true

    # # ---- Async rules (old Section 15) ----
    unawaited_futures: true                # catches "no unawaited futures"
    avoid_void_async: true

    # # ---- Logging / no print (old Section 16) ----
    avoid_print: true                      # forces AppLogger usage instead

    # # ---- Imports & structure ----
    directives_ordering: true
    avoid_relative_lib_imports: true
    always_use_package_imports: true
    one_member_abstracts: false            # we intentionally use 1-method usecases

    # # ---- Clarity / clean code (old Sections 28–30, partial) ----
    prefer_final_locals: true
    prefer_final_fields: true
    unnecessary_this: true
    avoid_empty_else: true
    curly_braces_in_flow_control_structures: true
    always_declare_return_types: true

    # # ---- Style ----
    prefer_single_quotes: true
    sort_constructors_first: true
    sort_child_properties_last: true