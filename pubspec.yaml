name: qeema
description: "Qeema — Personal finance app for the Egyptian market"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.16.0
  dio: ^5.10.0
  drift: ^2.34.2
  sqlite3: ^3.4.0
  flutter_secure_storage: ^10.3.1
  get_it: ^9.2.1
  go_router: ^17.3.0
  decimal: ^3.2.4
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  local_auth: ^3.0.2
  connectivity_plus: ^7.3.0
  flutter_local_notifications: ^22.0.1
  path_provider: ^2.1.6
  path: ^1.9.1
  shared_preferences: ^2.5.5
  flutter_bloc: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.4
  build_runner: ^2.15.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  
  android: "launcher_icon"
  ios: true
  
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
    
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48 # Size within 48 <= icon_size <= 256
    
  linux:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
